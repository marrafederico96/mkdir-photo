<mat-toolbar>
    <span>MkDir Photo</span>
    @if (this.rootDir()) {
    <button matButton="tonal" (click)="setRootDirectory()">
        {{this.rootDir()?.name}}
    </button>
    } @else {
    <button matFab extended (click)="setRootDirectory()">
        <mat-icon>folder</mat-icon>
        Seleziona Root
    </button>
    }
</mat-toolbar>
