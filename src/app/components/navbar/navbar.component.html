<mat-toolbar>
    <span>MkDir Photo</span>
    @if (this.rootDir()) {
    <button matButton="tonal" (click)="setRootDirectory()">
        {{this.rootDir()?.name}}
    </button>
    } @else {
    <button matButton="tonal" (click)="setRootDirectory()">
        Seleziona Root
    </button>
    }
</mat-toolbar>
