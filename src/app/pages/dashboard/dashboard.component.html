<div class="page-content">
    @for (item of contentDir(); track $index) {
    <button matButton class="btn-item">
        <div class="folder-item">
            <mat-icon>{{ item.kind === 'directory' ? 'folder' : 'description' }}</mat-icon>
            <span>{{item.name}}</span>
        </div>
    </button>
    }
</div>
