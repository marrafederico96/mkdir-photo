<div class="page-content">
    <div>
        <button matButton="tonal" [disabled]="!canGoBack()" (click)="goBack()">
            <mat-icon>arrow_back</mat-icon>
            Indietro
        </button>
    </div>

    @for (item of contentDir(); track $index) {
    <div class="item-row" [class.directory]="item.kind === 'directory'">

        <div class="item-clickable-area" (click)="openItem(item)" role="button" tabindex="0">
            <mat-icon>{{ item.kind === 'directory' ? 'folder' : 'description' }}</mat-icon>
            <span class="item-name">{{ item.name }}</span>
        </div>

        <button matIconButton class="delete-btn" (click)="deleteItem($event, item)">
            <mat-icon>delete</mat-icon>
        </button>
    </div>
    }
</div>
